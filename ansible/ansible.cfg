# Configuración local de Ansible para este proyecto.
# Ansible lee este fichero automáticamente cuando se ejecuta desde esta carpeta.

[defaults] # Fichero de inventario por defecto: evita tener que pasar '-i hosts' en cada comando.
inventory = hosts
host_key_checking = False # Desactiva la comprobación interactiva de la clave del host al conectar por SSH. Evita la pregunta "Are you sure you want to continue connecting?" en la primera conexión a la VM, lo que permite ejecutar los playbooks de forma desatendida.